<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Request Board</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-sm: 0 1px 2px rgba(20, 18, 14, 0.06);
      --shadow-md: 0 8px 24px rgba(20, 18, 14, 0.1);
      --color-bg: #f7f6f2;
      --color-surface: #fbfbf9;
      --color-surface-2: #f1efe9;
      --color-border: #d8d3cb;
      --color-text: #25211b;
      --color-text-muted: #706c66;
      --color-text-faint: #9e9a93;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #d6e6e4;
      --color-success: #437a22;
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --content-wide: 1120px;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #242320;
      --color-border: #393836;
      --color-text: #e1ded8;
      --color-text-muted: #a29f98;
      --color-text-faint: #77746f;
      --color-text-inverse: #171614;
      --color-primary: #4f98a3;
      --color-primary-hover: #66aeb9;
      --color-primary-highlight: #233235;
      --color-success: #79b75b;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-text);
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--color-primary) 12%, transparent), transparent 30%),
        var(--color-bg);
    }

    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a { color: inherit; }
    img, svg { display: block; max-width: 100%; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .page { width: min(calc(100% - 2rem), var(--content-wide)); margin: 0 auto; padding: 1.5rem 0 3rem; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      font-weight: 700;
      font-size: var(--text-sm);
    }

    .brand-mark {
      width: 2.5rem;
      height: 2.5rem;
      padding: 0.45rem;
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

    .theme-toggle,
    .sort-button,
    .btn,
    .like-button {
      transition:
        transform var(--transition-interactive),
        background var(--transition-interactive),
        border-color var(--transition-interactive);
    }

    .theme-toggle,
    .sort-button {
      min-width: 44px;
      min-height: 44px;
      padding: 0 1rem;
      border-radius: 9999px;
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      background: var(--color-surface);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: stretch;
    }

    .panel {
      background: color-mix(in srgb, var(--color-surface) 94%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }

    .hero-copy,
    .request-form { padding: 2rem; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 9999px;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: var(--text-xl);
      line-height: 1.1;
      margin-bottom: 1rem;
      max-width: 16ch;
    }

    .hero-copy p,
    .board-header p,
    .helper,
    .request-card p,
    .request-foot,
    .likes-label {
      color: var(--color-text-muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .stat {
      padding: 1rem;
      border-radius: var(--radius-lg);
      background: var(--color-surface-2);
      border: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);
    }

    .stat-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
    }

    .stat-value {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-top: 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    .request-form,
    .field {
      display: grid;
      gap: 1rem;
    }
